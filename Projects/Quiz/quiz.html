<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Quiz
    </title>

    <link rel="stylesheet" href="./quiz.css">
</head>

<body>

    <div class="bubble" id="bubble1"></div>
    <div class="bubble" id="bubble2"></div>
    <div class="bubble" id="bubble3"></div>
    <div class="bubble" id="bubble4"></div>

    <div class="container">

        <div class="Start" id="start">
            <h1>Water Quiz</h1>
            <p>Test Your Knowledge of H<sub>2</sub>O!</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="Quiz" id="quiz">
            <div id="quiz header">
                
                <h2 id="question"><!-- Question --></h2>
                <h4> Question <span id="current-ques">0</span> of <span id="total-ques">5</span> </h4>
                <p>Score: <span id="score">0</span> </p>
            
            </div>
    
            <div class="Answers" id="answers">
                <!-- Answers Options -->
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <div class="Result" id="result">
            <h1> Quiz Result</h1>
            <div id="info">
                <p> You Scored <span id="score">0</span> out of <span id="total-ques"></span> </p>

                <h3 id="result-msg"> Nice! </h3>
            </div>
            <button id="restart">Restart Quiz</button>
        </div>
    </div>
</body>
</html>
