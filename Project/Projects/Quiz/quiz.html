<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Quiz
    </title>

    <script src="https://kit.fontawesome.com/381071a656.js" crossorigin="anonymous"></script>

    <link rel="icon" href="./icons8-quiz-64.png">
    <link rel="stylesheet" href="./quiz.css">
</head>

<body>

    <div class="bubble" id="bubble1"></div>
    <div class="bubble" id="bubble2"></div>
    <div class="bubble" id="bubble3"></div>
    <div class="bubble" id="bubble4"></div>

        <div class="Screen active" id="start">
            <h1>Water Quiz</h1>
            <p>Test Your Knowledge of H<sub>2</sub>O!</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="Screen" id="quiz">
            <div id="quiz-header">
                <p> Question <span id="current-ques">0</span> of <span id="total-ques">5</span> </p>
                <p>Score: <span id="score">0</span> </p>
            </div>
            <h2 id="question">Question</h2>
    
            <div class="Answers" id="answers">
                <!-- Answers Options -->
            </div>

            <div class="progress-bar">
                <div class="Progress" id="progress"></div>
            </div>
        </div>

        <div class="Screen" id="result">
            <h1> Quiz Result</h1>
            <div id="info">
                <p> You Scored <span id="final-score">0</span> / <span id="max-score">5</span> </p>

                <h2 id="result-msg"> Nice! </h2>
            </div>
            <button id="restart"><i class="fa-solid fa-arrow-rotate-left"></i>Restart Quiz</button>
        </div>

    <script src="./quiz.js"></script>
</body>
</html>
