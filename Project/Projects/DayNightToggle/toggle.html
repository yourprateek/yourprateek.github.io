<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle</title>

    <link rel="icon" type="image/png" href="../../Images/Toggle-btn.png">
    <script src="https://kit.fontawesome.com/381071a656.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="toggle.css">
</head>

<body>
    <div class="container">
            
            <div class="clouds-stars">
                <div class="clouds-group">
                    <div class="clouds" id="cloud1"></div>
                    <div class="clouds" id="cloud2"></div>
                    <div class="clouds" id="cloud3"></div>
                    <div class="clouds" id="cloud4"></div>
                    <div class="clouds" id="cloud5"></div>
                </div>
            
                <div class="stars-group">
                    <div class="stars" id="star1"></div>
                    <div class="stars" id="star2"></div>
                    <div class="stars" id="star3"></div>
                    <div class="stars" id="star4"></div>
                    <div class="stars" id="star5"></div>
                    <div class="stars" id="star6"></div>
                </div>
            </div>

            <div id="sun-moon-container">
                <div id="sun" class="celestial">
                    <div class="moon-circles" id="circle1"></div>
                    <div class="moon-circles" id="circle2"></div>
                    <div class="moon-circles" id="circle3"></div>

                    <input type="checkbox" id="check">
                    <label for="check" id="toggle"></label>
                </div>
                <div aria-hidden="true" id="ghost" ></div>
            </div>
    </div>
</body>
</html>
